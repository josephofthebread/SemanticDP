name: SemanticDP-gendata
desc: Build every corpus of the grid and publish them as wandb artifacts
cmd: python3 gendata.py
env:
  vars:
    - WANDB_ENTITY: josephofthebread
    - WANDB_PROJECT: SemanticDP
  python:
    type: manual
    version: "3.12"
    requirements-file: requirements-data.txt
    local-paths:
      - gendata.py
cloud-instance-types:
  - c1.4
