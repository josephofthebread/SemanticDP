name: SemanticDP-evaluate
desc: Evaluate one trained adapter
cmd: python3 evaluate.py --model "$MODEL" --lora "$ADAPTER" $EXTRA
env:
  docker:
    image: docker.io/pytorch/pytorch:2.11.0-cuda12.6-cudnn9-runtime
  vars:
    - PIP_BREAK_SYSTEM_PACKAGES: "1"
    - WANDB_ENTITY: josephofthebread
    - WANDB_PROJECT: SemanticDP
    - MODEL
    - ADAPTER
    - EXTRA
  python:
    type: manual
    version: "3.12"
    requirements-file: requirements-evaluate.txt
    local-paths:
      - evaluate.py
      - ifeval
cloud-instance-types:
  - g2.1
