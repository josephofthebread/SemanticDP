name: SemanticDP-train
desc: LoRA fine-tune one grid cell
cmd: python3 train.py --model "$MODEL" --split "$SPLIT" --seed "$SEED" $EXTRA
env:
  docker:
    image: docker.io/pytorch/pytorch:2.10.0-cuda12.6-cudnn9-runtime
  vars:
    - PIP_BREAK_SYSTEM_PACKAGES: "1"
    - WANDB_ENTITY: josephofthebread
    - WANDB_PROJECT: SemanticDP
    - MODEL
    - SPLIT
    - SEED
    - EXTRA
  python:
    type: manual
    version: "3.12"
    requirements-file: requirements-train.txt
    local-paths:
      - train.py
cloud-instance-types:
  - g2.1
