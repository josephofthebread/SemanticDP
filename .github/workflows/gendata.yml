name: Generate data

on:
  workflow_dispatch:
    inputs:
      seed:
        description: Seed for the deterministic build.
        type: number
        default: 0
      train-n:
        description: Train rows per corpus.
        type: number
        default: 16384
      probe-n:
        description: Held-out entity-fidelity probe records.
        type: number
        default: 375
      push:
        description: Push the splits to wandb as artifacts.
        type: boolean
        default: true

jobs:
  gendata:
    runs-on: ubuntu-latest

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      WANDB_ENTITY: ${{ vars.WANDB_ENTITY }}
      WANDB_PROJECT: ${{ vars.WANDB_PROJECT }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require the wandb environment
        if: ${{ inputs.push }}
        run: |
          set -eu
          missing=''
          [ -n "${WANDB_API_KEY:-}" ] || missing="$missing WANDB_API_KEY(secret)"
          [ -n "${WANDB_ENTITY:-}" ] || missing="$missing WANDB_ENTITY(variable)"
          [ -n "${WANDB_PROJECT:-}" ] || missing="$missing WANDB_PROJECT(variable)"
          if [ -n "$missing" ]; then
            echo "::error::Missing required wandb configuration:$missing"
            echo "Set them in Settings > Secrets and variables > Actions, or re-run with push disabled."
            exit 1
          fi
          echo "wandb: entity=$WANDB_ENTITY project=$WANDB_PROJECT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync the environment
        run: make install

      - name: Build the corpora
        run: |
          uv run python gendata.py \
            --seed '${{ inputs.seed }}' \
            --train-n '${{ inputs.train-n }}' \
            --probe-n '${{ inputs.probe-n }}' \
            ${{ inputs.push && '' || '--no-push' }}

      - name: Upload the manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: data/_manifest.json
          if-no-files-found: error
          retention-days: 30
