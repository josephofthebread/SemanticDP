name: Results

on:
  workflow_dispatch:

jobs:
  results:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build the tables
        run: uv run --group results python results.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      - name: Upload them
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/*.csv
